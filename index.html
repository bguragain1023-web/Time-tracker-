<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- bootstrap CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- FontAwesome CDN  -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <style>
      .wrapper {
        background: linear-gradient(
          rgba(255, 0, 0, 0.814),
          rgba(128, 0, 128, 0.834)
        );
        min-height: 100vh;
      }

      .table {
        --bs-body-bg: transparent;
      }
    </style>
    <title>Time Tracker</title>
  </head>

  <body>
    <div class="wrapper pt-5">
      <div class="container">
        <!-- title -->
        <h1 class="text-center">Time tracker</h1>

        <!-- form -->
        <form
          action="javascript:void(0)"
          onsubmit="handleOnSubmit(this)"
          class="border rounded-5 shadow-lg p-5 mt-5"
        >
          <div class="row g-3">
            <div class="col-md-7">
              <input
                type="text"
                class="form-control"
                placeholder="Task "
                aria-label="task"
                name="task"
                id="task"
              />
            </div>
            <div class="col-md-2">
              <input
                type="number"
                class="form-control"
                placeholder="40"
                aria-label="hr"
                min="1"
                name="hr"
                id="hr"
              />
            </div>

            <div class="col-md-3 d-grid">
              <button class="btn btn-primary">Add New Task</button>
            </div>
          </div>
        </form>

        <!-- tables -->

        <div class="row mt-5">
          <div class="col-md">
            <h3 class="text-center">Entry list</h3>
            <hr />

            <!-- entry list  -->
            <table class="table table-striped table-hover border">
              <tbody id="entryList"></tbody>
            </table>
          </div>
          <div class="col-md">
            <h3 class="text-center">Bad list</h3>
            <hr />

            <!-- Bad list  -->
            <table class="table table-striped table-hover border">
              <tbody id="badList"></tbody>
            </table>

            <div class="alert alert-success">
              You could have save = <span id="savedHour">0</span> hours
            </div>
          </div>
        </div>

        <div class="alert alert-success">
          Total hours allocated <span id="ttlHours">0</span> hours
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
